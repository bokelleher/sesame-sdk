name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: build, test, conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy (all features)
        run: cargo clippy --all-features --all-targets

      - name: Build (default)
        run: cargo build

      - name: Build (no default features, verify-only / RNG-free)
        run: cargo build --no-default-features

      # The conformance gate: the unit tests plus tests/conformance.rs assert
      # that this crate reproduces the golden vectors (generated from rust-pois,
      # committed under test-vectors/) byte-for-byte. The vectors are NOT
      # regenerated here: they are the fixed cross-implementation contract.
      - name: Unit + conformance tests
        run: cargo test --features serde

  msrv:
    name: minimum supported Rust (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      # --locked: build the exact committed dependency versions, so the MSRV
      # floor is reproducible and a dependency floating its own MSRV upward
      # cannot silently break this job.
      - run: cargo build --all-features --locked

  cpp:
    name: C++ SDK (cmake, conformance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y cmake libssl-dev
      - name: Configure
        run: cmake -S cpp -B cpp/build -DCMAKE_BUILD_TYPE=Release -DSESAME_WERROR=ON
      - name: Build
        run: cmake --build cpp/build -j
      # Reproduce the golden vectors byte-for-byte (the same test-vectors/ the
      # Rust crate proves against) plus the KAT/round-trip unit tests.
      - name: Test (conformance + unit)
        run: ctest --test-dir cpp/build --output-on-failure

  python:
    name: Python SDK (pytest, conformance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (sesame-esam + pytest)
        run: pip install ./python pytest
      # Same golden vectors as the Rust crate and C++ SDK, plus KATs and the
      # negative matrix.
      - name: Test (conformance + unit)
        run: pytest python/tests -q

  go:
    name: Go SDK (go test, conformance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Format check
        run: test -z "$(gofmt -l go)"
      - name: Vet
        run: cd go && go vet ./...
      # Same golden vectors as the other SDKs, plus KATs and the negative matrix.
      - name: Test (conformance + unit)
        run: cd go && go test ./...
